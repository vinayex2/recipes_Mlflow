# .github/workflows/ci.yml
#
# LLMOps Phase 2 — Continuous Integration
#
# Triggers on every push to main and on every pull request.
# Submits a one-off notebook run to Databricks Community Edition via the
# Runs Submit API, polls until completion, then exits with the notebook's
# exit code so GitHub marks the check as passed or failed.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DATABRICKS_HOST      e.g. https://community.cloud.databricks.com
#   DATABRICKS_TOKEN     personal access token from Databricks user settings
#   OPENAI_API_KEY       forwarded into the notebook as a job env var
#
# Required in your Databricks workspace:
#   - The CI notebook uploaded to /Shared/llmops/llmops_phase2_ci
#   - The candidate model registered in MLflow (from Phase 1)

name: LLMOps CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci-quality-gates:
    name: Run CI quality gates on Databricks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python + deps (only needed for the poller script below) ───────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poller dependencies
        run: pip install requests

      # ── 3. Submit notebook run to Databricks CE + poll for result ────────────
      - name: Submit and poll Databricks CI notebook
        env:
          DATABRICKS_HOST:  ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}          
          GIT_SHA:          ${{ github.sha }}
          GIT_REF:          ${{ github.ref }}
          GIT_PR:           ${{ github.event.pull_request.number || '' }}
          GEMINI_ENDPOINT:  ${{ secrets.GEMINI_ENDPOINT }}
        run: python .github/scripts/submit_and_poll.py
