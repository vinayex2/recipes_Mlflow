<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Chat Interface</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; }
        .chat-container { max-width: 600px; margin: auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #ccc; padding: 24px; }
        .messages { min-height: 200px; margin-bottom: 20px; }
        .message { margin-bottom: 12px; }
        .user { color: #007bff; font-weight: bold; }
        .bot { color: #28a745; font-weight: bold; }
        form { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 8px 16px; border: none; border-radius: 4px; background: #007bff; color: #fff; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Flask Chat Interface</h2>
        <div class="messages" id="messages">
            <!-- Messages will be appended here by JS -->
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="user-input" placeholder="Type your message..." required autofocus>
            <button id="send-btn">Send</button>
        </div>
        <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let requestId = null; // Store the request_id

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `<span class="${sender}">${sender.charAt(0).toUpperCase() + sender.slice(1)}:</span> <span>${text}</span>`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        sendBtn.onclick = async function(e) {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;
            appendMessage('user', text);
            input.value = '';
            const headers = { 'Content-Type': 'application/json' };
            if (requestId) {
                headers['X-Request-ID'] = requestId;
            }
            const res = await fetch('/chat', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            appendMessage('bot', data.response);
            requestId = data.request_id; // Save for next request
        };
        </script>
    </div>
</body>
</html>
