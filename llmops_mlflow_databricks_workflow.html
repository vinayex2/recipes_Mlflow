<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>LLMOps — MLflow & Databricks Workflow</title>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #16161a;
    --border: rgba(255,255,255,0.08);
    --text-primary: #e8e6df;
    --text-secondary: #9c9a92;
    --purple-50: #EEEDFE; --purple-200: #AFA9EC; --purple-600: #534AB7; --purple-800: #3C3489;
    --teal-50: #E1F5EE; --teal-200: #5DCAA5; --teal-600: #0F6E56; --teal-800: #085041;
    --coral-50: #FAECE7; --coral-200: #F0997B; --coral-600: #993C1D; --coral-800: #712B13;
    --blue-50: #E6F1FB; --blue-200: #85B7EB; --blue-600: #185FA5; --blue-800: #0C447C;
    --gray-50: #F1EFE8; --gray-200: #B4B2A9; --gray-600: #5F5E5A; --gray-800: #444441;
    --green-600: #3B6D11; --green-800: #27500A;
    --amber-600: #854F0B; --amber-800: #633806;
    --red-400: #E24B4A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }
  header {
    max-width: 780px;
    margin: 0 auto 40px;
  }
  header h1 {
    font-size: 13px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  header h2 {
    font-size: 28px;
    font-weight: 400;
    line-height: 1.25;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
  header h2 em {
    font-style: italic;
    color: var(--purple-200);
  }
  .diagram-wrap {
    max-width: 780px;
    margin: 0 auto;
    background: #1a1a1f;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    overflow-x: auto;
  }
  svg text { font-family: 'Georgia', serif; }
  .th { font-size: 14px; font-weight: 600; fill: var(--text-primary); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--text-secondary); }
  .t  { font-size: 14px; font-weight: 400; fill: var(--text-primary); }
  .arr { stroke: var(--text-secondary); stroke-width: 1.2; fill: none; }
  .leader { stroke: var(--text-secondary); stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
  .box { fill: #222228; stroke: rgba(255,255,255,0.12); }

  /* Color ramp classes — dark mode fills */
  .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #3C3489; stroke: #AFA9EC; }
  .c-purple .th { fill: #EEEDFE; } .c-purple .ts { fill: #AFA9EC; }
  .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #085041; stroke: #5DCAA5; }
  .c-teal .th { fill: #E1F5EE; } .c-teal .ts { fill: #5DCAA5; }
  .c-coral rect, .c-coral circle, .c-coral ellipse { fill: #712B13; stroke: #F0997B; }
  .c-coral .th { fill: #FAECE7; } .c-coral .ts { fill: #F0997B; }
  .c-blue rect, .c-blue circle, .c-blue ellipse { fill: #0C447C; stroke: #85B7EB; }
  .c-blue .th { fill: #E6F1FB; } .c-blue .ts { fill: #85B7EB; }
  .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #2C2C2A; stroke: #5F5E5A; }
  .c-gray .th { fill: #D3D1C7; } .c-gray .ts { fill: #888780; }
  .c-green rect, .c-green circle, .c-green ellipse { fill: #27500A; stroke: #97C459; }
  .c-green .th { fill: #EAF3DE; } .c-green .ts { fill: #97C459; }

  .node { cursor: pointer; }
  .node:hover rect, .node:hover circle, .node:hover ellipse { opacity: 0.85; }

  footer {
    max-width: 780px;
    margin: 32px auto 0;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
</style>
</head>
